<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Вход | ThingSpeak Monitor</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body class="login-body">
  <main class="login-card">
    <div class="eyebrow">ThingSpeak Monitor</div>
    <h1>Авторизация</h1>
    <p class="login-subtitle">Безопасный вход в веб-интерфейс мониторинга устройств и конечных серверов.</p>

    {% if error %}
      <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    <form method="post" class="login-form" autocomplete="off">
      <label>
        <span>Логин</span>
        <input type="text" name="username" required autofocus>
      </label>
      <label>
        <span>Пароль</span>
        <input type="password" name="password" required>
      </label>
      <button type="submit" class="primary-button">Войти</button>
    </form>
  </main>
</body>
</html>
